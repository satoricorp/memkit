[package]
name = "satori"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
arrow-array = "57"
arrow-schema = "57"
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
fastembed = "5"
futures-util = "0.3"
glob = "0.3"
lancedb = "0.26"
lance-index = "2.0"
notify = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
uuid = { version = "1", features = ["v4", "serde"] }
walkdir = "2"
